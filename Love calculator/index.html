<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<form class="container">

    <h1>❤️ Love Calculator ❤️</h1>

    <div class="circle">
        <span id="result">0%</span>
    </div>

    <div class="input-box">
        <input type="text" placeholder="Your Name" id="Boy">
        <input type="text" placeholder="Partner Name" id="Girl">
    </div>

    <button type="submit" id="matchBtn">Calculate Love ❤️</button>

</form>

<script src="script.js"></script>
</body>
</html>
